# NullVPN Config Deploy — Canonical Reusable Workflow Template
# Policy: pool1/node1 is ALWAYS the test target.
# Prod deploy (node3, node4, node5) only proceeds after node1 test passes.
#
# Runner topology:
#   Test jobs  → runs-on: [self-hosted, nullvpn-dev-workstation]
#   Deploy jobs → runs-on: [self-hosted, vps-01]
#   Utility    → runs-on: ubuntu-latest

name: Config Generate → Test (node1) → Deploy (prod)

on:
  workflow_dispatch:
    inputs:
      config_type:
        description: 'Config type to generate and deploy'
        required: true
        type: choice
        options:
          - vless
          - sing-box
          - all
      skip_prod_deploy:
        description: 'Run test only (skip prod deploy)'
        required: false
        default: 'false'
        type: boolean

env:
  # ── Test target (canonical: pool1 / node1) ──────────────────────────
  TEST_NODE:        node1
  TEST_POOL:        pool1
  TEST_HOST_IPV4:   34.24.103.218
  TEST_HOST_IPV6:   "2600:1900:4021:3a6::"
  TEST_HOST_DNS:    pool1.nullvpn.net
  # ── Prod nodes (deploy only after test gate passes) ─────────────────
  PROD_NODES:       "node3 node4 node5"
  PROD_NODE3_IPV4:  34.141.132.237
  PROD_NODE4_IPV4:  35.231.63.234
  PROD_NODE5_IPV4:  35.228.176.231

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # STAGE 1: Generate configs (both test + prod variants)
  # ─────────────────────────────────────────────────────────────────────
  generate:
    name: Generate Configs
    runs-on: [self-hosted, nullvpn-dev-workstation]
    outputs:
      config_artifact: ${{ steps.gen.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config(s)
        id: gen
        run: |
          echo "Generating config type: ${{ inputs.config_type }}"
          # TODO: replace with actual config generation script
          # ./scripts/generate-config.sh --type ${{ inputs.config_type }} --output ./dist/
          echo "artifact_name=config-${{ inputs.config_type }}-${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Upload config artifact
        uses: actions/upload-artifact@v4
        with:
          name: config-${{ inputs.config_type }}-${{ github.run_id }}
          path: ./dist/
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────
  # STAGE 2: Test gate — deploy to node1 ONLY, run checks
  # ─────────────────────────────────────────────────────────────────────
  test-node1:
    name: "Test Gate: node1 (pool1 | us-east1-b)"
    needs: generate
    runs-on: [self-hosted, nullvpn-dev-workstation]
    environment: test
    steps:
      - name: Download config artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.generate.outputs.config_artifact }}
          path: ./dist/

      - name: Push config to node1
        env:
          SSH_KEY: ${{ secrets.NODE_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/node_key && chmod 600 /tmp/node_key
          scp -i /tmp/node_key -o StrictHostKeyChecking=no \
            ./dist/* \
            deploy@${{ env.TEST_HOST_IPV4 }}:/etc/nullvpn/

      - name: Restart VPN service on node1
        env:
          SSH_KEY: ${{ secrets.NODE_SSH_KEY }}
        run: |
          ssh -i /tmp/node_key -o StrictHostKeyChecking=no \
            deploy@${{ env.TEST_HOST_IPV4 }} \
            'sudo systemctl restart nullvpn && sleep 3 && sudo systemctl is-active nullvpn'

      - name: Connectivity probe — node1
        run: |
          echo "Probing ${{ env.TEST_HOST_DNS }} ..."
          # TODO: replace PORT with actual VPN port (e.g. 443, 8443)
          timeout 10 bash -c 'until nc -z ${{ env.TEST_HOST_IPV4 }} ${VPN_PORT:-443}; do sleep 1; done'
          echo "✅ node1 connectivity OK"

      - name: Check service logs on node1
        env:
          SSH_KEY: ${{ secrets.NODE_SSH_KEY }}
        run: |
          ssh -i /tmp/node_key -o StrictHostKeyChecking=no \
            deploy@${{ env.TEST_HOST_IPV4 }} \
            'sudo journalctl -u nullvpn -n 20 --no-pager'

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/node_key

  # ─────────────────────────────────────────────────────────────────────
  # STAGE 3: Prod deploy — runs ONLY if test-node1 passed AND skip_prod_deploy != true
  # ─────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Prod Nodes (node3/node4/node5)
    needs: test-node1
    if: ${{ inputs.skip_prod_deploy != 'true' }}
    runs-on: [self-hosted, vps-01]
    environment: prod
    strategy:
      matrix:
        node:
          - { name: node3, ip: "34.141.132.237", region: "europe-west4-a" }
          - { name: node4, ip: "35.231.63.234",  region: "us-east1-b" }
          - { name: node5, ip: "35.228.176.231", region: "europe-north1-a" }
      fail-fast: false   # deploy to remaining nodes even if one fails
    steps:
      - name: Download config artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.generate.outputs.config_artifact }}
          path: ./dist/

      - name: Push config to ${{ matrix.node.name }}
        env:
          SSH_KEY: ${{ secrets.NODE_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/node_key && chmod 600 /tmp/node_key
          scp -i /tmp/node_key -o StrictHostKeyChecking=no \
            ./dist/* \
            deploy@${{ matrix.node.ip }}:/etc/nullvpn/

      - name: Restart VPN on ${{ matrix.node.name }} (${{ matrix.node.region }})
        env:
          SSH_KEY: ${{ secrets.NODE_SSH_KEY }}
        run: |
          ssh -i /tmp/node_key -o StrictHostKeyChecking=no \
            deploy@${{ matrix.node.ip }} \
            'sudo systemctl restart nullvpn && sleep 3 && sudo systemctl is-active nullvpn'

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/node_key

      - name: "✅ ${{ matrix.node.name }} deployed"
        run: echo "Deployed to ${{ matrix.node.name }} (${{ matrix.node.region }}) @ ${{ matrix.node.ip }}"
